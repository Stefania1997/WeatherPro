<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherPro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="wrapper">
    <div class="search-section" id="searchSection">
      <div class="logo-wrap">
        <span class="logo-icon">◈</span>
        <h1 class="logo">weather<span>pro</span></h1>
      </div>
      <p class="tagline">Clima en tiempo real para cualquier ciudad del mundo</p>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="cityInput" placeholder="Busca una ciudad..." onkeypress="if(event.key === 'Enter') getWeather()">
        <button onclick="getWeather()">Buscar</button>
      </div>
    </div>

    <main id="results"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
